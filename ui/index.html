<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalManus</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #7c6ff7;
      --accent2: #56cfb2;
      --text: #e2e4f0;
      --text2: #8b90b0;
      --green: #3ecf8e;
      --red: #f56565;
      --yellow: #f6c90e;
      --radius: 10px;
      --sidebar: 260px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 16px;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .logo span { font-size: 22px; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    select, input[type=text] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
    }
    select:focus, input[type=text]:focus { border-color: var(--accent); }

    .tool-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      color: var(--text2);
    }
    .tool-toggle span { display: flex; align-items: center; gap: 6px; }

    .toggle {
      position: relative;
      width: 34px;
      height: 18px;
    }
    .toggle input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--surface2);
      border-radius: 18px;
      cursor: pointer;
      transition: .2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      left: 3px;
      top: 3px;
      background: var(--text2);
      border-radius: 50%;
      transition: .2s;
    }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before { transform: translateX(16px); background: #fff; }

    #new-chat-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-top: auto;
      transition: opacity .2s;
    }
    #new-chat-btn:hover { opacity: .85; }

    .session-info {
      font-size: 11px;
      color: var(--text2);
      background: var(--surface2);
      border-radius: 6px;
      padding: 8px;
      word-break: break-all;
    }

    /* ── Main ────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Chat ────────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .welcome {
      text-align: center;
      margin: auto;
      max-width: 500px;
    }
    .welcome h1 { font-size: 32px; color: var(--accent); margin-bottom: 8px; }
    .welcome p  { color: var(--text2); font-size: 15px; line-height: 1.6; }
    .welcome .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
    .chip {
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text2);
      transition: border-color .2s, color .2s;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }

    /* ── Messages ─────────────────────────────────────── */
    .msg-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 800px; width: 100%; margin: 0 auto; }

    .user-msg {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      border-radius: var(--radius) var(--radius) 2px var(--radius);
      max-width: 70%;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .agent-turn { display: flex; flex-direction: column; gap: 8px; }

    /* thinking */
    .thinking-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text2);
      font-style: italic;
      white-space: pre-wrap;
    }

    /* tool call */
    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .tool-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      background: var(--surface2);
      font-size: 13px;
      font-weight: 600;
    }
    .tool-header:hover { filter: brightness(1.1); }
    .tool-icon { font-size: 16px; }
    .tool-name { color: var(--accent2); flex: 1; }
    .tool-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
    .status-running { background: rgba(246,201,14,.15); color: var(--yellow); }
    .status-ok      { background: rgba(62,207,142,.15); color: var(--green); }
    .status-error   { background: rgba(245,101,101,.15); color: var(--red); }
    .chevron { color: var(--text2); transition: transform .2s; font-size: 12px; }
    .tool-body { display: none; }
    .tool-body.open { display: block; }
    .tool-section { padding: 10px 14px; border-top: 1px solid var(--border); }
    .tool-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 6px; }
    .tool-section pre { margin: 0; font-size: 12px; overflow-x: auto; }
    .tool-section code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }

    /* final message */
    .final-msg {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.7;
    }
    .final-msg p { margin-bottom: 10px; }
    .final-msg p:last-child { margin-bottom: 0; }
    .final-msg h1,.final-msg h2,.final-msg h3 { margin: 14px 0 8px; color: var(--accent); }
    .final-msg ul,.final-msg ol { padding-left: 20px; margin-bottom: 10px; }
    .final-msg li { margin-bottom: 4px; }
    .final-msg a { color: var(--accent2); }
    .final-msg pre {
      background: #0d1117;
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .final-msg code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; }
    .final-msg :not(pre) > code {
      background: rgba(124,111,247,.15);
      color: var(--accent);
      padding: 2px 5px;
      border-radius: 4px;
    }

    /* error */
    .error-card {
      background: rgba(245,101,101,.08);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--red);
    }

    /* typing indicator */
    .typing { display: flex; gap: 4px; padding: 12px 16px; align-items: center; }
    .typing span {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* ── Input ────────────────────────────────────────── */
    #input-area {
      padding: 16px 32px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .input-row {
      display: flex;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      align-items: flex-end;
    }
    .input-row:focus-within { border-color: var(--accent); }
    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      resize: none;
      max-height: 160px;
      min-height: 24px;
      line-height: 1.5;
      font-family: inherit;
    }
    #send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
      transition: opacity .2s;
    }
    #send-btn:hover { opacity: .85; }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* file list */
    #file-list { margin-top: 8px; font-size: 12px; color: var(--text2); max-width: 800px; margin-inline: auto; }
    #file-list a { color: var(--accent2); text-decoration: none; margin-right: 10px; }
    #file-list a:hover { text-decoration: underline; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div class="logo"><span>⚡</span> LocalManus</div>

  <div>
    <div class="section-label">Provider</div>
    <select id="provider-sel">
      <option value="ollama">🦙 Ollama (local)</option>
      <option value="openai">🟢 OpenAI</option>
      <option value="anthropic">🟣 Anthropic / Claude</option>
    </select>
  </div>

  <div>
    <div class="section-label">Model</div>
    <input type="text" id="model-input" placeholder="e.g. llama3.2" />
  </div>

  <div id="api-key-section" style="display:none">
    <div class="section-label">API Key</div>
    <input type="text" id="api-key-input" placeholder="sk-..." />
  </div>

  <div id="base-url-section">
    <div class="section-label">Ollama URL</div>
    <input type="text" id="base-url-input" value="http://localhost:11434/v1" />
  </div>

  <div>
    <div class="section-label">Tools</div>
    <div class="tool-toggle">
      <span>🐍 Python</span>
      <label class="toggle"><input type="checkbox" id="t-python" checked /><span class="slider"></span></label>
    </div>
    <div class="tool-toggle">
      <span>🖥️ Shell</span>
      <label class="toggle"><input type="checkbox" id="t-shell" checked /><span class="slider"></span></label>
    </div>
    <div class="tool-toggle">
      <span>📁 Files</span>
      <label class="toggle"><input type="checkbox" id="t-files" checked /><span class="slider"></span></label>
    </div>
    <div class="tool-toggle">
      <span>🌐 Web Search</span>
      <label class="toggle"><input type="checkbox" id="t-search" checked /><span class="slider"></span></label>
    </div>
  </div>

  <div id="session-box" style="display:none">
    <div class="section-label">Session</div>
    <div class="session-info" id="session-id-display">—</div>
  </div>

  <button id="new-chat-btn">+ New Chat</button>
</aside>

<!-- ── Main ───────────────────────────────────────────────────────── -->
<main id="main">
  <div id="chat">
    <div class="welcome" id="welcome">
      <h1>⚡ LocalManus</h1>
      <p>An open-source agentic AI that runs locally.<br>Powered by Ollama, OpenAI, or Claude.</p>
      <div class="chips">
        <div class="chip" onclick="fillInput('Write a Python script that generates a bar chart of random sales data')">📊 Plot a chart</div>
        <div class="chip" onclick="fillInput('Search the web for the latest AI agent frameworks in 2026 and summarise')">🌐 Web search</div>
        <div class="chip" onclick="fillInput('Write a Python script that scrapes the top 5 titles from Hacker News')">🤖 Scrape HN</div>
        <div class="chip" onclick="fillInput('Create a markdown report on the ReAct agent pattern with code examples')">📝 Write a report</div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <div class="input-row">
      <textarea id="msg-input" rows="1" placeholder="Ask LocalManus anything…"></textarea>
      <button id="send-btn" title="Send">▶</button>
    </div>
    <div id="file-list"></div>
  </div>
</main>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let sessionId = null;
let isRunning  = false;

// ── Provider selector behaviour ────────────────────────────────────────────────
const providerSel   = document.getElementById('provider-sel');
const apiKeySection = document.getElementById('api-key-section');
const baseUrlSection= document.getElementById('base-url-section');
const modelInput    = document.getElementById('model-input');

const DEFAULTS = { ollama: 'llama3.2', openai: 'gpt-4o', anthropic: 'claude-sonnet-4-6' };

providerSel.addEventListener('change', () => {
  const p = providerSel.value;
  apiKeySection.style.display  = p !== 'ollama'  ? 'block' : 'none';
  baseUrlSection.style.display = p === 'ollama'  ? 'block' : 'none';
  modelInput.placeholder = DEFAULTS[p] || '';
  if (!modelInput.value) modelInput.value = '';
});

// ── Textarea auto-resize ───────────────────────────────────────────────────────
const textarea = document.getElementById('msg-input');
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
});
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('send-btn').addEventListener('click', sendMessage);

// ── New chat ──────────────────────────────────────────────────────────────────
document.getElementById('new-chat-btn').addEventListener('click', () => {
  sessionId = null;
  document.getElementById('chat').innerHTML = '';
  document.getElementById('chat').appendChild(document.getElementById('welcome') || makeWelcome());
  document.getElementById('file-list').innerHTML = '';
  document.getElementById('session-box').style.display = 'none';
  document.getElementById('session-id-display').textContent = '—';
  // Re-show welcome if it was removed
  if (!document.getElementById('welcome')) {
    const w = document.createElement('div');
    w.className = 'welcome'; w.id = 'welcome';
    w.innerHTML = document.querySelector('.welcome')?.innerHTML || '';
    document.getElementById('chat').appendChild(w);
  }
  location.reload(); // simplest reset
});

// ── Quick prompt chips ────────────────────────────────────────────────────────
function fillInput(text) {
  textarea.value = text;
  textarea.dispatchEvent(new Event('input'));
  textarea.focus();
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  const msg = textarea.value.trim();
  if (!msg || isRunning) return;

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  textarea.value = '';
  textarea.style.height = 'auto';
  isRunning = true;
  document.getElementById('send-btn').disabled = true;

  // User bubble
  appendUserMsg(msg);

  // Agent turn container
  const turn = document.createElement('div');
  turn.className = 'msg-wrap';
  const agentTurn = document.createElement('div');
  agentTurn.className = 'agent-turn';
  turn.appendChild(agentTurn);
  document.getElementById('chat').appendChild(turn);

  // Typing indicator
  const typing = addTyping(agentTurn);

  const body = {
    message: msg,
    session_id: sessionId || undefined,
    provider: providerSel.value,
    model: modelInput.value || undefined,
    api_key: document.getElementById('api-key-input').value || undefined,
    base_url: providerSel.value === 'ollama'
              ? (document.getElementById('base-url-input').value || undefined)
              : undefined,
  };

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    // Map tool_call_id → card element
    const toolCards = {};

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop();

      for (const part of parts) {
        if (!part.startsWith('data:')) continue;
        let event;
        try { event = JSON.parse(part.slice(5).trim()); } catch { continue; }
        handleEvent(event, agentTurn, typing, toolCards);
      }
    }
  } catch (err) {
    typing.remove();
    agentTurn.appendChild(makeErrorCard('Connection error: ' + err.message));
  }

  isRunning = false;
  document.getElementById('send-btn').disabled = false;
  scrollToBottom();
  await refreshFiles();
}

// ── Event handler ─────────────────────────────────────────────────────────────
function handleEvent(ev, container, typing, toolCards) {
  switch (ev.type) {

    case 'session':
      sessionId = ev.session_id;
      document.getElementById('session-id-display').textContent = ev.session_id.slice(0, 8) + '…';
      document.getElementById('session-box').style.display = 'block';
      break;

    case 'thinking':
      typing.remove();
      if (ev.content) container.appendChild(makeThinkingCard(ev.content));
      break;

    case 'tool_call': {
      typing.remove();
      const card = makeToolCard(ev.tool_name, ev.tool_args, ev.tool_call_id);
      toolCards[ev.tool_call_id] = card;
      container.appendChild(card);
      scrollToBottom();
      break;
    }

    case 'tool_result': {
      const card = toolCards[ev.tool_call_id];
      if (card) updateToolResult(card, ev.content, ev.is_error);
      // re-add typing indicator for next step
      container.appendChild(typing);
      scrollToBottom();
      break;
    }

    case 'message':
      typing.remove();
      container.appendChild(makeFinalMsg(ev.content));
      break;

    case 'error':
      typing.remove();
      container.appendChild(makeErrorCard(ev.content));
      break;

    case 'done':
      typing.remove();
      break;
  }
  scrollToBottom();
}

// ── DOM builders ──────────────────────────────────────────────────────────────
function appendUserMsg(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  const el = document.createElement('div');
  el.className = 'user-msg';
  el.textContent = text;
  wrap.appendChild(el);
  document.getElementById('chat').appendChild(wrap);
  scrollToBottom();
}

function addTyping(container) {
  const el = document.createElement('div');
  el.className = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(el);
  return el;
}

function makeThinkingCard(text) {
  const el = document.createElement('div');
  el.className = 'thinking-card';
  el.innerHTML = '💭 ' + escapeHtml(text);
  return el;
}

function makeToolCard(name, args, id) {
  const card = document.createElement('div');
  card.className = 'tool-card';

  const header = document.createElement('div');
  header.className = 'tool-header';
  header.innerHTML = `
    <span class="tool-icon">🔧</span>
    <span class="tool-name">${escapeHtml(name)}</span>
    <span class="tool-status status-running">running</span>
    <span class="chevron">▼</span>`;
  header.addEventListener('click', () => {
    body.classList.toggle('open');
    header.querySelector('.chevron').style.transform =
      body.classList.contains('open') ? 'rotate(180deg)' : '';
  });

  const body = document.createElement('div');
  body.className = 'tool-body open';

  // Args section
  if (args && Object.keys(args).length) {
    const sec = document.createElement('div');
    sec.className = 'tool-section';
    sec.innerHTML = `<div class="tool-section-label">Input</div>`;
    const pre = document.createElement('pre');
    const code = document.createElement('code');
    code.className = 'language-json';
    code.textContent = JSON.stringify(args, null, 2);
    pre.appendChild(code);
    sec.appendChild(pre);
    hljs.highlightElement(code);
    body.appendChild(sec);
  }

  card.appendChild(header);
  card.appendChild(body);
  card.dataset.id = id;
  return card;
}

function updateToolResult(card, content, isError) {
  const status = card.querySelector('.tool-status');
  status.className = 'tool-status ' + (isError ? 'status-error' : 'status-ok');
  status.textContent = isError ? 'error' : 'done';

  const body = card.querySelector('.tool-body');
  const sec = document.createElement('div');
  sec.className = 'tool-section';
  sec.innerHTML = `<div class="tool-section-label">Output</div>`;

  const pre = document.createElement('pre');
  const code = document.createElement('code');
  // Try to detect if it's JSON or code
  const trimmed = (content || '').trim();
  if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
    code.className = 'language-json';
  } else if (trimmed.includes('\n') && (trimmed.includes('def ') || trimmed.includes('import '))) {
    code.className = 'language-python';
  } else {
    code.className = 'language-text';
  }
  code.textContent = content || '(no output)';
  pre.appendChild(code);
  sec.appendChild(pre);
  hljs.highlightElement(code);
  body.appendChild(sec);
}

function makeFinalMsg(md) {
  const el = document.createElement('div');
  el.className = 'final-msg';
  el.innerHTML = marked.parse(md || '');
  // Highlight code blocks
  el.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
  return el;
}

function makeErrorCard(text) {
  const el = document.createElement('div');
  el.className = 'error-card';
  el.innerHTML = '❌ ' + escapeHtml(text || 'Unknown error');
  return el;
}

// ── File list ─────────────────────────────────────────────────────────────────
async function refreshFiles() {
  if (!sessionId) return;
  try {
    const r = await fetch(`/api/sessions/${sessionId}`);
    if (!r.ok) return;
    const data = await r.json();
    const list = document.getElementById('file-list');
    if (!data.files || data.files.length === 0) { list.innerHTML = ''; return; }
    const links = data.files
      .filter(f => !f.startsWith('_'))
      .map(f => `<a href="/workspace/${sessionId}/${f}" target="_blank" download>📎 ${f}</a>`)
      .join('');
    list.innerHTML = links ? `<span style="color:var(--text2)">Workspace: </span>${links}` : '';
  } catch {}
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function scrollToBottom() {
  const chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

// Configure marked
marked.setOptions({
  breaks: true,
  gfm: true,
});
</script>
